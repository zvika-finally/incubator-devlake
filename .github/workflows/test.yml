name: unit-test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, release-*]
    paths:
      - '**.go'
      - '**.py'
      - '**.toml'
      - '**.sh'
      - 'Makefile'
      - 'go.mod'
      - 'go.sum'
      - '.github/workflows/*.yml'
      - 'test/**'
  schedule:
    - cron: '0 0 * * *' # run ci every night

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest]
    runs-on: ${{ matrix.os }}
    container: mericodev/lake-builder:latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set git config
      run: git config --global --add safe.directory $(pwd)
    - name: Build Python
      run: |
        cd backend
        echo "Building Python"
        make build-python
    - name: Cache unit-test
      id: cache-unit-test
      uses: actions/cache@v3
      with:
        path: |
          ~/.cache/go-build
          ${{ env.GOPATH }}/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    - name: Install mockery
      run: |
        # The lake-builder container ships /go/bin/mockery at v2.20.0 and
        # /go/bin precedes /usr/local/bin on PATH, so we must overwrite the
        # binary in /go/bin (not just install to /usr/local/bin) for the
        # Makefile's version check to see v2.53.5.
        curl -sL https://github.com/vektra/mockery/releases/download/v2.53.5/mockery_2.53.5_Linux_x86_64.tar.gz \
          | tar -xz -C /go/bin mockery
        chmod +x /go/bin/mockery
        mockery --version
    - name: Unit tests
      run: |
        go version
        cp env.example .env
        cd backend
        make unit-test
