name: devlake-postgresql

services:
  postgres: 
    image: postgres:17.2
    volumes:
      - postgres-storage:/var/lib/postgresql
    restart: always
    ports:
      - 5432:5432
    environment:
      POSTGRES_DB: lake
      POSTGRES_USER: merico
      POSTGRES_PASSWORD: merico
      TZ: UTC

  grafana:
    image: devlake.docker.scarf.sh/apache/devlake-dashboard:latest
    build:
      context: grafana/
    ports:
      - 3002:3000
    volumes:
      - grafana-storage:/var/lib/grafana
      - ./grafana/dashboards/postgresql:/etc/grafana/dashboards:ro
    environment:
      GF_SERVER_ROOT_URL: "http://localhost:4000/grafana"
      GF_USERS_DEFAULT_THEME: "light"
      DATABASE_TYPE: postgresql
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: lake
      DATABASE_USER: merico
      DATABASE_PASSWORD: merico
      TZ: UTC
    restart: always
    depends_on:
      - postgres

  devlake:
    image: devlake-local:latest
    build:
      context: backend
      dockerfile: Dockerfile.local
      args:
        HTTPS_PROXY: "${HTTPS_PROXY}"
        GOPROXY: "${GOPROXY}"
    ports:
      - 8084:8080
    restart: always
    volumes:
      - devlake-log:/app/logs
    env_file:
      - ./.env
    environment:
      DB_URL: postgres://merico:merico@postgres:5432/lake?sslmode=disable
      E2E_DB_URL: postgres://merico:merico@postgres:5432/lake_test?sslmode=disable
      REMOTE_PLUGIN_DIR: ""
      FORCE_MIGRATION: "true"
      LOGGING_DIR: /app/logs
      TZ: UTC
    depends_on:
      - postgres

  config-ui:
    image: devlake.docker.scarf.sh/apache/devlake-config-ui:latest
    build:
      context: "config-ui"
    ports:
      - 4000:4000
    env_file:
      - ./.env
    environment:
      DEVLAKE_ENDPOINT: devlake:8080
      GRAFANA_ENDPOINT: grafana:3000
      TZ: UTC
    depends_on:
      - devlake

  authproxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.15.3-amd64
    network_mode: "host"
    ports:
      - 4180:4180
    env_file:
      - ./.env

volumes:
  postgres-storage:
  grafana-storage:
  devlake-log:
